# Standalone reconciler stack. Run alongside any producer that writes into
# PROJECTS_DIR — e.g. `/opt/ai-office/projects`, a CI worker's drop directory,
# or a developer's local folder.
#
# Contract with the producer:
#   projects/{slug}/compose.yml        (or docker-compose.yml)
#   projects/{slug}/.env               (optional, chmod 600 recommended)
#   projects/{slug}/<any tracked subdir>/
#   projects/{slug}/DEPLOY             touch to trigger apply
#   projects/{slug}/REMOVE             touch to trigger teardown
#
# The reconciler writes back into:
#   projects/{slug}/.reconciler/status.json
#   projects/{slug}/.reconciler/applied.hash
#   projects/{slug}/.reconciler/last_apply.log

services:
  reconciler:
    build: .
    # image: ghcr.io/<owner>/compose-reconciler:latest  # once published
    container_name: compose-reconciler
    restart: unless-stopped
    volumes:
      # The directory the producer writes into. Mount read-write so the
      # reconciler can manage the `.reconciler/` subdir and archive removed
      # projects under `.archive/`. Default — sibling каталог
      # ../ai-office-projects (удобно для локалки, где оба репо рядом).
      # На VPS / в другой раскладке задай PROJECTS_DIR в .env явно.
      - ${PROJECTS_DIR:-../ai-office-projects}:/projects
      # Mirror-mount: same host path also visible inside the container at the
      # exact same path. Needed because compose CLI (running in this
      # container) itself stats files it receives via `--project-directory`
      # — which is a HOST path so the host daemon can resolve per-project
      # bind-mounts (`./site`, `./data`). Without mirroring, compose fails
      # early with "env file X not found" / missing bind-mount source.
      - ${HOST_PROJECTS_DIR:-${PWD}/../ai-office-projects}:${HOST_PROJECTS_DIR:-${PWD}/../ai-office-projects}
      # Policy file — deployment-specific. See config/policy.example.yaml.
      - ${POLICY_FILE:-./config/policy.yaml}:/etc/reconciler/policy.yaml:ro
      # Host Docker socket — reconciler invokes `docker compose up/down` on
      # the host daemon. This is a privileged capability; do not run this
      # service on hosts whose docker daemon you do not own.
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - PROJECTS_DIR=/projects
      # Host-absolute path to the same directory. The docker daemon resolves
      # bind-mounts in per-project compose files (`./data`, `./site`) against
      # host paths, not paths inside this container — so --project-directory
      # must point to the host view. Without this env, relative bind-mounts
      # fail with "path not shared" on Docker Desktop and with wrong-path
      # errors on Linux.
      - HOST_PROJECTS_DIR=${HOST_PROJECTS_DIR:-${PWD}/../ai-office-projects}
      - POLICY_FILE=/etc/reconciler/policy.yaml
      - RECONCILE_INTERVAL=${RECONCILE_INTERVAL:-30}
      # Cold build of a multi-service project without layer cache can take
      # several minutes; 15min default gives headroom without masking real
      # runaway builds. Lower it for static-only deployments.
      - COMPOSE_TIMEOUT=${COMPOSE_TIMEOUT:-900}
      - DOCKER_BUILDKIT=1
      - COMPOSE_DOCKER_CLI_BUILD=1
